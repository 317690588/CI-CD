name: lint

on:
  push:
    branches:
      - main # 只有 push 到 main 分支才触发
  pull_request:
    branches:
      - main # 只有 PR 目标为 main 分支才触发

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 安装pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install
      - name: eslint校验代码
        run: pnpm run lint
      - name: Prettier 格式检查
        run: pnpm run format:check
