name: deploy

on:
  workflow_run:
    workflows: ["lint"]        # 监听 Lint workflow
    types:
      - completed              # 等它完成后
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 安装pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install
      - name: 构建产物
        run: pnpm run build
      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: ./dist

  depoy:
    runs-on: ubuntu-latest
    needs: build # 等 test job 成功后才跑
    permissions:
      contents: write # 🔑 关键：允许推送代码
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path:
            ./dist

            # 2. 部署到 GitHub Pages（免费静态托管）
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
